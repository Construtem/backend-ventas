apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: back-ventas-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api-ventas.tssw.cl
      secretName: api-ventas-tls
  rules:
    - host: api-ventas.tssw.cl
      http:
        paths:
          - path: / # Aquí puedes cambiar el path si tu backend escucha en algo específico
            pathType: Prefix
            backend:
              service:
                name: back-ventas-service
                port:
                  number: 80
